<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivist - {{.Title}}</title>
    <link rel="stylesheet" href="/static/bulma.min.css">
    <link rel="stylesheet" href="/static/app.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .login-card .title {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="box login-card">
            <p class="title is-4">Archivist</p>
            <p class="subtitle is-6 has-text-centered">Gestión de Aventureros</p>
            {{if .Error}}
            <div class="notification is-danger">{{.Error}}</div>
            {{end}}
            <form method="POST" action="/login">
                <div class="field">
                    <label class="label" for="username">Usuario</label>
                    <div class="control">
                        <input class="input" type="text" id="username" name="username" required autofocus>
                    </div>
                </div>
                <div class="field">
                    <label class="label" for="password">Contraseña</label>
                    <div class="control">
                        <input class="input" type="password" id="password" name="password" required>
                    </div>
                </div>
                <div class="field">
                    <div class="control">
                        <button type="submit" class="button is-primary is-fullwidth">Iniciar Sesión</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
