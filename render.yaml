services:
  - type: web
    name: archivist
    env: go
    buildCommand: ./build.sh
    startCommand: ./app
    healthCheckPath: /health
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true

  - type: postgresql
    name: archivist-db
    plan: free
    ipAllowList: []
